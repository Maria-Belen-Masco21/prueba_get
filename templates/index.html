<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta</title>

    <style>
        body {
            background-color: #f0f4f8; /* color de fondo */
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .contenedor {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="checkbox"] {
            margin: 5px 0;
        }

        .boton {
            width: 100%;
            padding: 10px;
            background-color: #840988; /* color del botón */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .boton:hover {
            background-color: #9f64ad; /* efecto hover */
        }
    </style>
</head>

<body>

    <h1>Encuesta para desarrolladores</h1>

    <div class="contenedor">
        <form action="{{ url_for('proceso') }}" method="POST">
            
            <label>NOMBRE:</label>
            <input type="text" name="nombre">

            <p>Marca los lenguajes que usas:</p>

            <input type="checkbox" name="lenguajes" value="python"> Python <br>
            <input type="checkbox" name="lenguajes" value="Java"> Java <br>
            <input type="checkbox" name="lenguajes" value="kotlin"> Kotlin <br>
            <input type="checkbox" name="lenguajes" value="Dart"> Dart <br><br>

            <input type="submit" value="Enviar" class="boton">
        </form>
    </div>

</body>
</html>
